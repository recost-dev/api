name = "ecoapi"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "eco-db"
database_id = "6e97ecc6-6aa5-4d28-b590-d501e188d007"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "bae737e6b52a4b22aeda239462033d1c"
preview_id = "6ac6516a2da6479f9f21958a9ad25f82"

# Local dev vars — set via .dev.vars (not committed), production secrets via: wrangler secret put <KEY>

[vars]
FRONTEND_URL = "https://ecoapi.dev"

[triggers]
crons = ["0 * * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1